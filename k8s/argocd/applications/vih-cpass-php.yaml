# Argo CD Application — CPaaS PHP.
# Docker/CI source: https://github.com/vihmessenger/vih_cpass_php
# Helm chart: set repoURL to the Git repo that contains k8s/charts/vih-cpass-php (infra monorepo).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vih-cpass-php
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/vihmessenger/Vih-infra.git
    targetRevision: main
    path: k8s/charts/vih-cpass-php
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: vih-messenger
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
