# After CodePipeline pushes to ECR, bump tag in Git or use Image Updater.
image:
  repository: 327512370966.dkr.ecr.us-east-1.amazonaws.com/vih-messenger
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  port: 80

ingress:
  enabled: false
  host: ""
  # Optional ACM cert ARN on ALB (same region as cluster). When set, HTTPS + redirect are configured.
  certificateArn: ""
