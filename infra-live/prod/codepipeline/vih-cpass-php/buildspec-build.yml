# Build Docker image for vih-cpass-php and push to ECR.
# Expects a Dockerfile at the repository root (adjust paths to match your app repo layout).
version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REPOSITORY
      - export IMAGE_URI="${ECR_REPOSITORY}:$IMAGE_TAG"
      - echo "IMAGE_URI=$IMAGE_URI"
  build:
    commands:
      - docker build -t $IMAGE_URI .
  post_build:
    commands:
      - docker push $IMAGE_URI
      - printf '{"ImageUri":"%s"}' "$IMAGE_URI" > imageDetail.json

artifacts:
  files:
    - imageDetail.json
