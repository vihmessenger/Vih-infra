# Build Docker image for vih-messenger (web frontend) and push to ECR.
# Repo: https://github.com/vihmessenger/vih-messenger — CodePipeline branch from Terragrunt (default newDesign; Dockerfile at root lives there).
#
# DOCKERFILE_PATH / DOCKER_BUILD_CONTEXT are set on the CodeBuild project (Terragrunt inputs).
version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      # `docker login` server must be registry host only (set by Terraform as ECR_REGISTRY).
      - export ECR_REGISTRY="${ECR_REGISTRY:-$(echo "$ECR_REPOSITORY" | cut -d'/' -f1)}"
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
      - export IMAGE_URI="${ECR_REPOSITORY}:$IMAGE_TAG"
      - echo "IMAGE_URI=$IMAGE_URI"
  build:
    commands:
      - docker build -f "$DOCKERFILE_PATH" -t "$IMAGE_URI" "$DOCKER_BUILD_CONTEXT"
  post_build:
    commands:
      - docker push $IMAGE_URI
      - printf '{"ImageUri":"%s"}' "$IMAGE_URI" > imageDetail.json

artifacts:
  files:
    - imageDetail.json
